name: Deploy to Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: vercel-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Restore Vercel credentials
        run: |
          mkdir -p "$HOME/.local/share/com.vercel.cli"
          printf '%s' '${{ secrets.VERCEL_AUTH_JSON }}' > "$HOME/.local/share/com.vercel.cli/auth.json"

      - name: Install Vercel CLI
        run: npm install --global vercel@50.1.3

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production

      - name: Deploy production
        run: vercel deploy --prod --yes
